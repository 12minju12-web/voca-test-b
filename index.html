<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 시험 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { background: white; width: 90%; max-width: 500px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .wrong-item { background: #fff1f0; border: 1px solid #ffa39e; padding: 12px; margin: 8px 0; border-radius: 8px; text-align: left; font-size: 0.95rem; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading-screen">
            <p>데이터 로딩 중...</p>
            <div class="loader"></div>
        </div>

        <div id="login-screen" class="hidden">
            <h2 id="team-title">단어 시험</h2>
            <select id="name-select"><option value="">이름을 선택하세요</option></select>
            <button onclick="startExam()">시험 시작</button>
        </div>

        <div id="exam-screen" class="hidden">
            <p>문제 <span id="current-idx">1</span> / <span id="total-idx">0</span></p>
            <h1 id="question-word" style="font-size: 2.5rem; margin: 1rem 0;"></h1>
            <input type="text" id="answer-input" placeholder="뜻을 입력하세요" autocomplete="off">
            <button onclick="nextQuestion()">다음</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>시험 종료! 🎉</h2>
            <p style="font-size: 2rem; font-weight: bold;"><span id="final-score">0</span> / <span id="final-total">0</span></p>
            <div id="wrong-list" style="max-height: 300px; overflow-y: auto;"></div>
            <button onclick="location.reload()" style="margin-top:20px;">처음으로</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkYuE787GAeER13m3KU4DB3RIafaNmhk-Q6txDD8Y-oplGOS0KN3uJDpgLX1IS17UYAQ/exec'; 
        const urlParams = new URLSearchParams(window.location.search);
        const TEAM = urlParams.get('team') || 'B';
        
        let questions = [], names = [], currentIdx = 0, answers = [], submittedToday = [];

        window.onload = async () => {
            try {
                const res = await fetch(`${SCRIPT_URL}?team=${TEAM}&v=${Math.random()}`);
                const data = await res.json();
                questions = data.questions;
                names = data.names;
                submittedToday = data.submittedToday || [];
                document.getElementById('team-title').innerText = `단어 시험 (${TEAM}팀)`;
                const select = document.getElementById('name-select');
                names.forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = opt.text = n;
                    select.add(opt);
                });
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch (e) { alert('데이터 로드 실패!'); }
        };

        function startExam() {
            const name = document.getElementById('name-select').value;
            if(!name) return alert('이름을 선택하세요!');
            if (submittedToday.includes(name)) return alert('이미 오늘 시험을 제출했습니다!');
            if(!confirm("시험을 시작하시겠습니까?")) return;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            document.getElementById('total-idx').innerText = questions.length;
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('question-word').innerText = questions[currentIdx].eng;
            document.getElementById('current-idx').innerText = currentIdx + 1;
            const input = document.getElementById('answer-input');
            input.value = '';
            input.focus();
        }

        function superClean(t) {
            if(!t) return "";
            return t.toString().replace(/\s+/g, "").replace(/[~?ㆍ!@#$%^&*()_+\-.]/g, "").replace(/[이가을를은는와과로으로에의]/g, "").trim();
        }

        function nextQuestion() {
            const inputEl = document.getElementById('answer-input');
            const userAnsRaw = inputEl.value.trim() || "(빈칸)";
            const correctAnsRaw = questions[currentIdx].kor;
            
            const correctAnswers = correctAnsRaw.split('/').map(ans => superClean(ans));
            const userAnswers = userAnsRaw.split(/[,/]/).map(ans => superClean(ans)).filter(ans => ans !== "");
            
            const isCorrect = userAnswers.some(uAns => correctAnswers.includes(uAns));
            
            answers.push({ eng: questions[currentIdx].eng, correctAns: correctAnsRaw, userAns: userAnsRaw, isCorrect: isCorrect });
            currentIdx++;
            if(currentIdx < questions.length) showQuestion();
            else submitResult();
        }

        async function submitResult() {
            const app = document.getElementById('app');
            const name = document.getElementById('name-select').value;
            app.innerHTML = '<h2>결과 전송 중...</h2><div class="loader"></div>';

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ fullName: name, team: TEAM, answers: answers }) });
                const score = answers.filter(a => a.isCorrect).length;
                app.innerHTML = `
                    <h2>시험 종료! 🎉</h2>
                    <div style="font-size: 2.5rem; font-weight: bold; color: #4a90e2; margin: 1rem 0;">${score} / ${answers.length}</div>
                    <div id="wrong-box" style="text-align:left; max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
                    <button onclick="location.reload()">처음으로</button>
                `;
                const wrongBox = document.getElementById('wrong-box');
                answers.filter(a => !a.isCorrect).forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'wrong-item';
                    div.innerHTML = `<strong>${a.eng}</strong><br>정답: ${a.correctAns}<br>입력: <span style="color:red">${a.userAns}</span>`;
                    wrongBox.appendChild(div);
                });
                if(score === answers.length) confetti();
            } catch (e) { alert('전송 오류 발생!'); }
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') nextQuestion(); });
    </script>
</body>
</html>
