<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 시험 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { background: white; width: 90%; max-width: 500px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .wrong-item { background: #fff1f0; border: 1px solid #ffa39e; padding: 12px; margin: 8px 0; border-radius: 8px; text-align: left; font-size: 0.95rem; line-height: 1.5; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading-screen">
            <p>데이터를 불러오고 있습니다...</p>
            <div class="loader"></div>
        </div>

        <div id="login-screen" class="hidden">
            <h2 id="team-title">단어 시험</h2>
            <select id="name-select"><option value="">이름을 선택하세요</option></select>
            <button onclick="startExam()">시험 시작하기</button>
        </div>

        <div id="exam-screen" class="hidden">
            <p style="color: #666;">문제 <span id="current-idx">1</span> / <span id="total-idx">0</span></p>
            <h1 id="question-word" style="font-size: 2.5rem; margin: 1rem 0;">...</h1>
            <input type="text" id="answer-input" placeholder="뜻을 입력하세요" autocomplete="off">
            <button onclick="nextQuestion()" style="margin-top: 20px;">다음 문제</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>시험 종료! 🎉</h2>
            <div style="font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 1rem 0;">
                <span id="final-score">0</span> / <span id="final-total">0</span>
            </div>
            <div id="wrong-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
            <p style="color: #888; font-size: 0.8rem;">결과가 선생님께 전송되었습니다.</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxb2fENowoP3T6AKF-2wUSRb_dja_hQhYxtk4DaTUEjT2-Rzu_rVncPEC-WhVomotpfA/exec'; // <--- 꼭 수정하세요!
        const urlParams = new URLSearchParams(window.location.search);
        const TEAM = urlParams.get('team') || 'A';
        
        let questions = [], names = [], currentIdx = 0, answers = [], submittedToday = [];

        window.onload = async () => {
            try {
                const res = await fetch(`${SCRIPT_URL}?team=${TEAM}`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                
                questions = data.questions;
                names = data.names;
                submittedToday = data.submittedToday || [];
                
                document.getElementById('team-title').innerText = `단어 시험 (${TEAM}팀)`;
                const select = document.getElementById('name-select');
                names.forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = opt.text = n;
                    select.add(opt);
                });
                
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch (e) {
                alert('데이터 로드 실패: ' + e.message);
            }
        };

        function startExam() {
            const name = document.getElementById('name-select').value;
            if(!name) return alert('이름을 선택해주세요!');
            
            // 🔥 재시험 방지 체크
            if (submittedToday.includes(name)) {
                alert('이미 오늘 시험을 제출했습니다. 재시험은 불가능합니다.');
                return;
            }
            
            if(!confirm(name + " 학생, 시험을 시작할까요?")) return;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            document.getElementById('total-idx').innerText = questions.length;
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('question-word').innerText = questions[currentIdx].eng;
            document.getElementById('current-idx').innerText = currentIdx + 1;
            const input = document.getElementById('answer-input');
            input.value = '';
            input.focus();
        }

        function superClean(t) {
            if(!t) return "";
            return t.replace(/\s+/g, "").replace(/[~?ㆍ!@#$%^&*()_+.]/g, "").replace(/[이가을를은는와과로으로에의]/g, "").trim();
        }

        function nextQuestion() {
            const userAns = document.getElementById('answer-input').value;
            const correctAns = questions[currentIdx].kor;
            
            // 복수 정답 체크 ( / 기준)
            const isCorrect = correctAns.split('/').some(answer => superClean(answer) === superClean(userAns));
            
            answers.push({ 
                eng: questions[currentIdx].eng, 
                correctAns: correctAns, 
                userAns: userAns, 
                isCorrect: isCorrect 
            });
            
            currentIdx++;
            if(currentIdx < questions.length) {
                showQuestion();
            } else {
                submitResult();
            }
        }

        async function submitResult() {
            const app = document.getElementById('app');
            const name = document.getElementById('name-select').value;
            app.innerHTML = '<h2>결과 전송 중...</h2><div class="loader"></div>';

            try {
                const payload = { fullName: name, team: TEAM, answers: answers };
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                
                // 결과 화면 구성
                const score = answers.filter(a => a.isCorrect).length;
                app.innerHTML = `
                    <h2>시험 종료! 🎉</h2>
                    <div style="font-size: 2.5rem; font-weight: bold; color: #4a90e2; margin: 1rem 0;">
                        ${score} / ${answers.length}
                    </div>
                    <div id="wrong-box" style="text-align:left; max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
                    <button onclick="location.reload()">처음으로</button>
                `;

                const wrongBox = document.getElementById('wrong-box');
                answers.filter(a => !a.isCorrect).forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'wrong-item';
                    div.innerHTML = `<strong>${a.eng}</strong><br>정답: ${a.correctAns}<br>입력: <span style="color:red">${a.userAns || '(빈칸)'}</span>`;
                    wrongBox.appendChild(div);
                });

                if(score === answers.length) confetti();
            } catch (e) {
                alert('전송 오류가 발생했습니다. 화면을 끄지 말고 선생님께 말씀하세요!');
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') nextQuestion();
        });
    </script>
</body>
</html>
